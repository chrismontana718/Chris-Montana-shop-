<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chris Montana Shop Online</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }
    header {
      padding: 60px 20px;
      background: #111;
    }
    h1 {
      font-size: 38px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      color: #ccc;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    .section {
      padding: 50px 20px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
    }
    footer {
      padding: 30px;
      background: #111;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chris Montana Shop</h1>
    <p>Dress Smart. Look Different.</p>
    <a class="btn" href="https://wa.me/250791372242">Order on WhatsApp</a>
  </header>

  <section class="section">
    <h2>Our Collection</h2>
    <div class="products">
      <div class="card">T-Shirts</div>
      <div class="card">Jeans</div>
      <div class="card">Jackets</div>
      <div class="card">Smart Looks</div>
    </div>
  </section>

  <section class="section">
    <h2>Location</h2>
    <p>Kigali, Rwanda</p>
  </section>

  <footer>
    <p>© 2026 Chris Montana Shop. All rights reserved.</p>
  </footer>
</body>
</html>
